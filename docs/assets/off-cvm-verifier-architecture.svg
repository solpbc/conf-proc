<svg xmlns="http://www.w3.org/2000/svg" width="1792" height="1024" viewBox="0 0 1792 1024" role="img" aria-labelledby="title desc">
  <title id="title">Off-CVM SEV-SNP verifier architecture</title>
  <desc id="desc">Owner-side verifier inputs, evidence bundle, appraisal gates, and AES-GCM key release flow.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#17313a" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#167b76"/>
    </marker>
    <style>
      .bg { opacity: 0.44; }
      .panel { fill: rgba(255,255,255,0.90); stroke: #365663; stroke-width: 2; rx: 18; filter: url(#shadow); }
      .panel-soft { fill: rgba(255,255,255,0.82); stroke: #8fb7b3; stroke-width: 1.6; rx: 16; }
      .gate { fill: rgba(248,253,252,0.95); stroke: #3d7774; stroke-width: 1.7; rx: 14; }
      .gate-num { fill: #167b76; }
      .critical { fill: #12323e; font-family: Inter, "Segoe UI", Arial, sans-serif; font-weight: 750; }
      .label { fill: #243e49; font-family: Inter, "Segoe UI", Arial, sans-serif; font-weight: 650; }
      .small { fill: #355762; font-family: Inter, "Segoe UI", Arial, sans-serif; font-size: 24px; }
      .tiny { fill: #466a73; font-family: Inter, "Segoe UI", Arial, sans-serif; font-size: 20px; }
      .gate-detail { fill: #466a73; font-family: Inter, "Segoe UI", Arial, sans-serif; font-size: 18px; }
      .mono { fill: #183842; font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace; font-size: 20px; }
      .white { fill: white; font-family: Inter, "Segoe UI", Arial, sans-serif; font-weight: 800; font-size: 24px; }
      .line { stroke: #167b76; stroke-width: 4; fill: none; marker-end: url(#arrow); }
      .line-soft { stroke: #83b5b1; stroke-width: 3; stroke-dasharray: 8 9; fill: none; }
      .pill { fill: #e9f5f3; stroke: #8fb7b3; stroke-width: 1.5; rx: 22; }
      .danger { fill: #fff5ef; stroke: #c97955; stroke-width: 1.5; rx: 12; }
      .success { fill: #edf8ef; stroke: #56a36b; stroke-width: 1.5; rx: 12; }
    </style>
  </defs>

  <rect width="1792" height="1024" fill="#fbfdfc"/>
  <image class="bg" href="off-cvm-verifier-whiteboard-bg.png" width="1792" height="1024" preserveAspectRatio="xMidYMid slice"/>
  <rect x="26" y="24" width="1740" height="974" rx="14" fill="none" stroke="#d7e4e7" stroke-width="2" stroke-dasharray="12 10"/>

  <text x="64" y="78" class="critical" font-size="44">Off-CVM SEV-SNP Verifier</text>
  <text x="64" y="118" class="small">Owner-side challenge, evidence appraisal, and key release for hosted journals. Azure produces evidence; the owner verifier decides.</text>

  <rect x="68" y="172" width="360" height="274" class="panel"/>
  <text x="96" y="216" class="label" font-size="28">Owner verifier inputs</text>
  <text x="96" y="256" class="small">Trusted local state</text>
  <rect x="96" y="284" width="292" height="42" class="pill"/>
  <text x="116" y="313" class="mono">nonce.hex</text>
  <text x="248" y="313" class="tiny">fresh challenge</text>
  <rect x="96" y="336" width="292" height="42" class="pill"/>
  <text x="116" y="365" class="mono">roots/amd</text>
  <text x="258" y="365" class="tiny">pinned ARK/ASK</text>
  <rect x="96" y="388" width="292" height="42" class="pill"/>
  <text x="116" y="417" class="mono">policy.json</text>
  <text x="260" y="417" class="tiny">TCB + PCR pins</text>

  <rect x="696" y="154" width="400" height="154" class="panel"/>
  <text x="732" y="198" class="label" font-size="28">Azure CVM attester</text>
  <text x="732" y="237" class="small">Runs <tspan class="mono">run.sh</tspan> inside the CVM</text>
  <text x="732" y="270" class="tiny">Reads vTPM HCLA + takes AK quote</text>

  <path class="line" d="M 424 300 C 512 300, 590 235, 690 235"/>
  <text x="472" y="276" class="tiny">nonce + guest key target</text>

  <rect x="544" y="348" width="704" height="152" class="panel-soft"/>
  <text x="572" y="388" class="label" font-size="28">File evidence bundle</text>
  <text x="572" y="424" class="mono">hcl_report.bin</text>
  <text x="780" y="424" class="mono">certs/vcek.pem</text>
  <text x="1010" y="424" class="mono">akpub.pem</text>
  <text x="572" y="462" class="mono">guest_x25519.pub.der</text>
  <text x="872" y="462" class="mono">quote.msg</text>
  <text x="1012" y="462" class="mono">quote.sig</text>
  <text x="1150" y="462" class="mono">quote.pcrs</text>
  <path class="line" d="M 896 308 L 896 342"/>

  <rect x="96" y="506" width="396" height="336" class="panel"/>
  <text x="124" y="550" class="label" font-size="28">No trust shortcuts</text>
  <rect x="124" y="582" width="322" height="54" class="danger"/>
  <text x="148" y="616" class="small">No MAA release authority</text>
  <rect x="124" y="650" width="322" height="54" class="danger"/>
  <text x="148" y="684" class="small">No root fetch at verify time</text>
  <rect x="124" y="718" width="322" height="84" class="success"/>
  <text x="148" y="752" class="small">Owner policy decides:</text>
  <text x="148" y="784" class="tiny">record-then-pin or pinned PCRs</text>

  <rect x="536" y="542" width="754" height="372" class="panel"/>
  <text x="568" y="586" class="label" font-size="30">Appraisal gates: all must pass</text>

  <g transform="translate(568 618)">
    <rect width="334" height="62" class="gate"/>
    <circle cx="34" cy="31" r="22" class="gate-num"/><text x="27" y="40" class="white">1</text>
    <text x="70" y="29" class="label" font-size="22">HCLA shape</text>
    <text x="70" y="54" class="gate-detail">sig HCLA; v1/v2; req_type=2</text>
  </g>
  <g transform="translate(928 618)">
    <rect width="334" height="62" class="gate"/>
    <circle cx="34" cy="31" r="22" class="gate-num"/><text x="27" y="40" class="white">2</text>
    <text x="70" y="29" class="label" font-size="22">AMD chain + report</text>
    <text x="70" y="54" class="gate-detail">Pinned ASK/ARK; report ECDSA</text>
  </g>
  <g transform="translate(568 696)">
    <rect width="334" height="62" class="gate"/>
    <circle cx="34" cy="31" r="22" class="gate-num"/><text x="27" y="40" class="white">3</text>
    <text x="70" y="29" class="label" font-size="22">Runtime binding</text>
    <text x="70" y="54" class="gate-detail">report_data = SHA-256(runtime)</text>
  </g>
  <g transform="translate(928 696)">
    <rect width="334" height="62" class="gate"/>
    <circle cx="34" cy="31" r="22" class="gate-num"/><text x="27" y="40" class="white">4</text>
    <text x="70" y="29" class="label" font-size="22">SNP policy</text>
    <text x="70" y="54" class="gate-detail">v3/v5; VMPL 0; DEBUG off; TCB</text>
  </g>
  <g transform="translate(568 774)">
    <rect width="334" height="62" class="gate"/>
    <circle cx="34" cy="31" r="22" class="gate-num"/><text x="27" y="40" class="white">5</text>
    <text x="70" y="29" class="label" font-size="22">AK binding</text>
    <text x="70" y="54" class="gate-detail">HCLAkPub matches akpub.pem</text>
  </g>
  <g transform="translate(928 774)">
    <rect width="334" height="62" class="gate"/>
    <circle cx="34" cy="31" r="22" class="gate-num"/><text x="27" y="40" class="white">6</text>
    <text x="70" y="29" class="label" font-size="22">Fresh quote</text>
    <text x="70" y="54" class="gate-detail">extraData = binding hash</text>
  </g>
  <g transform="translate(748 852)">
    <rect width="374" height="48" class="gate"/>
    <circle cx="34" cy="24" r="20" class="gate-num"/><text x="27" y="33" class="white">7</text>
    <text x="70" y="31" class="label" font-size="22">PCR policy: record or pin</text>
  </g>

  <path class="line" d="M 1250 424 C 1350 424, 1320 360, 1378 342"/>
  <path class="line" d="M 1286 728 C 1348 728, 1340 520, 1390 498"/>

  <rect x="1370" y="174" width="344" height="346" class="panel"/>
  <text x="1400" y="218" class="label" font-size="28">Release output</text>
  <text x="1400" y="256" class="small">Only after all gates pass</text>
  <rect x="1400" y="288" width="276" height="62" class="success"/>
  <text x="1422" y="326" class="small">X25519 ECDH -> HKDF</text>
  <rect x="1400" y="364" width="276" height="62" class="success"/>
  <text x="1422" y="402" class="small">AES-256-GCM release</text>
  <text x="1400" y="462" class="mono">release.json</text>
  <text x="1400" y="492" class="mono">verifier_pub.der</text>

  <rect x="1370" y="582" width="344" height="214" class="panel-soft"/>
  <text x="1400" y="626" class="label" font-size="26">Live replay example</text>
  <text x="1400" y="664" class="tiny">DC2as_v5, eastus, 2026-06-18</text>
  <text x="1400" y="702" class="mono">HCLA v1, SNP report v5</text>
  <text x="1400" y="736" class="mono">PCR 3a47d561...6cac</text>
  <text x="1400" y="770" class="tiny">Resource group deleted after capture</text>

  <path class="line-soft" d="M 536 938 L 1290 938"/>
  <text x="560" y="968" class="tiny">Fail-closed behavior: any failed gate stops release; verifier returns FAIL and no journal secret is sent.</text>
</svg>
